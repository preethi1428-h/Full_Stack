<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counselor Dashboard - Healing Hands</title>
    <link rel="stylesheet" href="../style.css/dashboard.css">
</head>

<body>
    <!-- Navbar -->
    <div class="navbar">
        <h2 class="logo">🩺 HEALING HANDS</h2>
        <button class="logout" onclick="window.location.href='../Assesment/counselor-login.html'">
            Logout
        </button>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Welcome Card -->
        <div class="welcome-card">
            <h2>Welcome, <span>Dr. Sarah Smith</span></h2>
            <p>Addiction Specialist: <span id="specialization">Loading...</span></p>
            <!-- <p>Addiction Specialist: Alcohol De-Addiction</p> -->
        </div>

        <!-- Appointments Table -->
        <div class="table-card">
            <h3> Upcoming Patient Appointments</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Patient Name</th>
                            <th>Phone</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Service</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTable">
                        <!-- Data loaded dynamically -->
                    </tbody>
                </table>
            </div>
            <p class="summary" id="summary">Loading appointments...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>© 2026 Healing Hands. Counselor Portal. All rights reserved.</footer>

    <script src="../Js/dashboard.js"></script>
</body>

</html>
