<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Healing Hands - Register</title>
    <link rel="stylesheet" href="../style.css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="form-box">
            <h1>Healing Hands</h1>
            <p class="subtitle">Create Your Account</p>

            <form id="signupForm">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                    <span class="error" id="nameError"></span>
                </div>

                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="Enter 10-digit phone number" required>
                    <span class="error" id="phoneError"></span>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                    <span class="error" id="emailError"></span>
                </div>

                <div class="input-group password-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter password (min 8 chars)" required>
                        <i class="eye-icon" id="togglePassword" style="display: inline-block;"></i>
                    </div>
                    <span class="error" id="passwordError"></span>
                </div>

                <button type="submit" class="btn">Register</button>
                <p class="login-text">
                    Already have an account? <a href="./login.html">Login</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../Js/register.js"> </script>


    <style>
        .error {
            color: #f56565;
            font-size: 0.85em;
            display: block;
            margin-top: 4px;
        }

        .input-group input:invalid {
            border-color: #000000;
        }
    </style>
</body>

</html>
