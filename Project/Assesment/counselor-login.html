<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Counselor Login</title>
  <link rel="stylesheet" href="../style.css/counselor_login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <h2 class="logo">HEALING HANDS</h2>
    <div class="nav-links">
      <a href="./login.html">User Login</a>
    </div>
  </div>

  <!-- Login Card -->
  <div class="container">
    <div class="card">
      <h2>Counselor Login</h2>

      <form id="loginForm">

        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required>
          <i class="fas fa-eye eye-icon" id="togglePassword"></i>
        </div>

        <span id="errorMsg" style="color:red;"></span>

        <button type="submit">Login</button>
      </form>

      <p class="register-text">
        Don't have an account?
        <a href="../Assesment/counselor_register.html">Register here</a>
      </p>

    </div>
  </div>


<script src="../Js/counselor_login.js"></script>

</body>
</html>
