<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Counselor Registration</title>
    <link rel="stylesheet" href="../style.css/counsoler_register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="navbar">
        <h2 class="logo">HEALING HANDS</h2>
        <div class="nav-links">
            <a href="../Assesment/counselor-login.html">Login</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Counselor Registration</h2>

            <form id="registerForm">

                <label>Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <small id="nameError" style="color: red;"></small>


                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
                <small id="emailError" style="color:red;"></small>

                <label>Specialization</label>
                <select id="specialization">
                    <option value="">Select Specialization</option>
                    <option value="1">Alcohol Addiction</option>
                    <option value="2">Smoking Addiction</option>
                    <option value="3">Drug Addiction</option>
                </select>
                <small id="specError" style="color:red;"></small>

                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Create password">
                    <i class="fas fa-eye eye-icon" id="togglePassword"></i>
                </div>
                <small id="passwordError" style="color:red;"></small>

                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm password">
                    <i class="fas fa-eye eye-icon" id="toggleConfirmPassword"></i>
                </div>
                <small id="confirmError" style="color:red;"></small>

                <button type="submit">Register</button>
            </form>

            <p class="login-text">
                Already have an account?
                <a href="../Assesment/counselor-login.html">Login here</a>
            </p>
        </div>
    </div>

    <script src="../Js/counselor_register.js"></script>


</body>

</html>
